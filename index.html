<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>بسهولة — نظام حجز ومتابعة عملاء للعيادات والصالونات</title>
    <meta name="description" content="نظّم حجوزاتك وتابع عملاءك بسهولة. نظام عربي بالكامل للعيادات والصالونات ومراكز اللياقة، بتذكير واتساب أوتوماتيك يقلل الغياب. جرّب 14 يوم مجاناً بدون بطاقة بنكية." />
    <meta name="keywords" content="نظام حجز, حجز مواعيد, تذكير واتساب, نظام عيادات, نظام صالونات, إدارة عملاء, حجوزات أونلاين, مصر" />
    <meta name="author" content="بسهولة" />
    <link rel="canonical" href="https://beshola.co/" />
    <!-- No static "robots" tag here on purpose — every route owns its own
         via react-helmet-async (see App.jsx/LandingPage.jsx/etc.), so a
         static tag here would sit alongside the per-route one instead of
         being replaced by it (Helmet only manages tags it itself rendered,
         not ones already in the static HTML), producing two conflicting
         <meta name="robots"> tags. Absence of the tag defaults to
         "index, follow" per search engine convention anyway. -->

    <!-- Open Graph (Facebook/WhatsApp link previews) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://beshola.co/" />
    <meta property="og:title" content="بسهولة — نظام حجز ومتابعة عملاء" />
    <meta property="og:description" content="نظّم حجوزاتك وتابع عملاءك بسهولة. جرّب 14 يوم مجاناً." />
    <meta property="og:image" content="https://beshola.co/og-image.png" />
    <meta property="og:locale" content="ar_EG" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="بسهولة — نظام حجز ومتابعة عملاء" />
    <meta name="twitter:description" content="نظّم حجوزاتك وتابع عملاءك بسهولة. جرّب 14 يوم مجاناً." />
    <meta name="twitter:image" content="https://beshola.co/og-image.png" />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet" />
  </head>
  <body class="bg-gray-50 font-sans">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
